<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Statistiques — SHREDDER 2.27</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --green: #2ecc71;
            --green-dark: #27ae60;
            --green-light: #e8f8f0;
            --green-mid: #d0f0e0;
            --text: #1a1a2e;
            --text-light: #555570;
            --text-muted: #888899;
            --white: #ffffff;
            --bg: #f7fdf9;
            --card: #ffffff;
            --border: #e2f0e8;
            --shadow: 0 4px 24px rgba(46, 204, 113, 0.08);
            --shadow-lg: 0 12px 40px rgba(46, 204, 113, 0.12);
            --radius: 16px;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
            line-height: 1.65;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 48px;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 17px;
            color: var(--text);
            text-decoration: none;
        }

        .nav-logo .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--green);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-logo .logo-icon img {
            width: 32px;
            height: 32px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-right img {
            height: 28px;
        }

        .nav-link {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-light);
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: var(--green-dark);
        }

        section {
            padding: 80px 48px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            font-family: 'DM Serif Display', serif;
            font-size: 40px;
            font-weight: 400;
            color: var(--text);
            margin-bottom: 14px;
            line-height: 1.2;
        }

        .section-sub {
            color: var(--text-light);
            font-size: 15px;
            max-width: 600px;
            margin-bottom: 48px;
            line-height: 1.7;
        }

        .text-center {
            text-align: center;
        }

        .text-center .section-sub {
            margin: 0 auto 48px;
        }

        .pill {
            display: inline-block;
            background: var(--green);
            color: white;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 5px 16px;
            border-radius: 50px;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .card h3 {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 10px;
        }

        .card p {
            font-size: 13.5px;
            color: var(--text-light);
        }

        .chart-container {
            width: 100%;
            height: 300px;
            background: #f9f9f9;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }

        footer {
            background: var(--text);
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            padding: 40px 48px;
            font-size: 13px;
        }

        footer span {
            color: var(--green);
            font-weight: 600;
        }
    </style>
</head>

<body>

    <nav>
        <a class="nav-logo" href="index.html">
            <div class="logo-icon" style="background: none;">
                <img src="images/logo.png" alt="Recybot Logo" style="width: 96px; height: 96px;">
            </div>
        </a>
        <div class="nav-right">
            <a href="index.html" class="nav-link">Accueil</a>
            <a href="statistics.html" class="nav-link">Statistiques</a>
            <img src="images/emineslogo.webp" alt="Emines UM6P Logo" style="height: 28px;">
        </div>
    </nav>

    <section>
        <h2>Statistiques en temps réel</h2>
        <div id="stats-grid"
            style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-top:32px;">
        </div>
        <p id="last-update" style="font-size:12px;color:#888;margin-top:12px;"></p>
    </section>

    <script>
        const CSV_URL = 'https://script.google.com/macros/s/AKfycbwazBVOGL2-DM9cl-Te1reMOJtUbiOvwOrzGDMTHwFevThHhQnbI_Ejog5HCnw_LqWtqQ/exec';

        function parseCSV(text) {
            const lines = text.trim().split('\n').filter(l => l.trim());
            const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
            const rows = lines.slice(1).map(line => {
                const vals = line.split(',').map(v => v.trim().replace(/^"|"$/g, ''));
                const obj = {};
                headers.forEach((h, i) => obj[h] = vals[i] ?? '');
                return obj;
            });
            return { headers, rows };
        }

        function createStatCard(title, value) {
            return `
          <div style="background:#f7fdf9;border:1px solid #e2f0e8;border-radius:16px;padding:20px;">
            <p style="font-size:13px;color:#555570;margin-bottom:6px;">${title}</p>
            <p style="font-size:28px;font-weight:600;color:#1a1a2e;">${value}</p>
          </div>`;
        }

        async function fetchAndRender() {
            try {
                const res = await fetch(CSV_URL, { cache: 'no-store' });
                if (!res.ok) {
                    throw new Error(`Failed to fetch data: ${res.statusText}`);
                }
                const text = await res.text();
                const { headers, rows } = parseCSV(text);

                // Calculate specific statistics
                const totalBottles = rows.length;
                const acceptedBottles = rows.filter(r => r.Statut && r.Statut.toLowerCase() === 'accepted').length;
                const rejectedBottles = totalBottles - acceptedBottles;
                const bottlesWithCap = rows.filter(r => r.Bouteille_Avec_Bouchon && (r.Bouteille_Avec_Bouchon.toLowerCase() === 'true' || r.Bouteille_Avec_Bouchon === '1')).length;

                const grid = document.getElementById('stats-grid');
                grid.innerHTML = ''; // Clear previous stats
                grid.innerHTML += createStatCard('Bouteilles Traitées', totalBottles);
                grid.innerHTML += createStatCard('Bouteilles Acceptées', acceptedBottles);
                grid.innerHTML += createStatCard('Bouteilles Rejetées', rejectedBottles);
                grid.innerHTML += createStatCard('Bouteilles avec Bouchon', bottlesWithCap);

                document.getElementById('last-update').textContent =
                    'Dernière mise à jour : ' + new Date().toLocaleTimeString();
            } catch (error) {
                console.error('Error fetching or rendering stats:', error);
                document.getElementById('stats-grid').innerHTML = `<p style="color: red;">Could not load statistics. ${error.message}</p>`;
            }
</html >
